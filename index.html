<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧理財體驗 — 展場互動原型</title>
<style>
  :root{
    --brand:#1854d6; --brand-2:#3b74f0; --brand-soft:#eaf1ff;
    --ink:#1b1b19; --muted:#7a7f88; --line:#e9ebee; --bg:#f4f6f9;
    --user-bg:#f0efea; --idle:#dfe4ee; --shadow:0 12px 44px rgba(20,40,90,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    background:linear-gradient(135deg,#1a3a7a,#3b74f0);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px;color:var(--ink)}
  .phone{width:390px;max-width:100%;height:820px;max-height:94vh;background:var(--bg);
    border-radius:40px;box-shadow:var(--shadow);overflow:hidden;position:relative;
    display:flex;flex-direction:column;border:11px solid #10131a}
  .statusbar{height:34px;background:#f4f6f9;display:flex;align-items:center;
    justify-content:space-between;padding:0 22px;font-size:13px;font-weight:700;flex-shrink:0}
  .statusbar .r{font-size:11px}
  .prog{height:3px;background:#e2e6ee;flex-shrink:0}
  .prog>div{height:100%;background:var(--brand);width:0;transition:width .4s ease}
  .reset{position:absolute;top:8px;right:14px;z-index:30;font-size:11px;
    background:rgba(0,0,0,.06);border:0;color:#333;padding:6px 10px;border-radius:20px;cursor:pointer}
  .screen{flex:1;overflow-y:auto;scroll-behavior:smooth}
  .screen::-webkit-scrollbar{width:0}

  /* 選擇頁 */
  .selpage{padding:26px 22px 22px}
  .selpage .kicker{font-size:12px;font-weight:700;color:var(--brand);letter-spacing:.05em}
  .selpage h1{font-size:23px;font-weight:800;margin:6px 0 4px;line-height:1.3}
  .selpage .lead{font-size:13.5px;color:var(--muted);margin-bottom:22px;line-height:1.6}
  .selpage .q{font-size:14px;font-weight:700;margin:22px 0 10px}
  .opt{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);
    color:var(--ink);font-size:15px;font-weight:600;padding:15px 16px;border-radius:14px;margin:9px 0;cursor:pointer;transition:.15s}
  .opt:hover{border-color:var(--brand)}
  .opt.sel{border-color:var(--brand);background:var(--brand-soft);color:var(--brand)}
  .slider-wrap{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:16px}
  .slider-wrap label{font-size:14px;font-weight:600;display:flex;justify-content:space-between;margin-bottom:14px}
  .slider-wrap .val{color:var(--brand);font-weight:800;font-size:18px}
  input[type=range]{width:100%;height:6px;border-radius:6px;appearance:none;
    background:linear-gradient(90deg,var(--brand) var(--fill,50%),#dde3ee var(--fill,50%));outline:none}
  input[type=range]::-webkit-slider-thumb{appearance:none;width:28px;height:28px;border-radius:50%;
    background:#fff;border:4px solid var(--brand);box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:pointer}
  .primary{width:100%;background:#1ea34d;color:#fff;border:0;font-size:16px;font-weight:700;
    padding:16px;border-radius:14px;cursor:pointer;margin-top:22px}
  .primary:hover{background:#158039}
  .primary:disabled{opacity:.35;cursor:not-allowed}

  /* 銀行 App 首頁 */
  .apphead{padding:14px 20px 4px}
  .apptop{display:flex;align-items:center;justify-content:space-between}
  .apptop h2{font-size:26px;font-weight:800}
  .apptop .icons{display:flex;gap:16px;font-size:19px}
  .apptop .icons .bell{position:relative}
  .apptop .icons .bell::after{content:"";position:absolute;top:-1px;right:-2px;width:7px;height:7px;background:#f24;border-radius:50%}
  .tabs{display:flex;gap:8px;padding:14px 20px 4px;overflow-x:auto}.tabs::-webkit-scrollbar{height:0}
  .tab{font-size:15px;font-weight:700;color:#8b93a1;padding:9px 15px;border-radius:22px;white-space:nowrap;cursor:pointer}
  .tab.on{background:var(--brand);color:#fff}.tab.on .ic{margin-right:4px}
  .seg{display:flex;background:#e4e9f2;border-radius:14px;margin:14px 20px;padding:4px}
  .seg div{flex:1;text-align:center;padding:11px;border-radius:11px;font-size:15px;font-weight:700;color:#7a8091;cursor:pointer}
  .seg div.on{background:#fff;color:var(--brand);box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .total{text-align:center;margin:16px 0 6px}
  .total .k{font-size:13px;color:var(--muted)}
  .total .v{font-size:26px;font-weight:800;letter-spacing:2px;margin-top:4px}
  .total .v small{font-size:15px;font-weight:700;margin-right:6px;letter-spacing:0}
  .hintcard{background:#fff;margin:14px 20px;border-radius:18px;padding:16px 16px 12px;
    box-shadow:0 4px 18px rgba(20,40,90,.08);position:relative;animation:glow 2.4s infinite}
  @keyframes glow{50%{box-shadow:0 0 0 4px rgba(24,84,214,.14)}}
  .hintcard .top{display:flex;gap:11px}
  .hintcard .bot{width:34px;height:34px;border-radius:10px;flex-shrink:0;
    background:linear-gradient(135deg,#3b74f0,#7aa7ff);display:grid;place-items:center;font-size:18px}
  .hintcard .msg{font-size:14.5px;line-height:1.6;color:#2a2f38;flex:1}
  .hintcard .x{position:absolute;top:12px;right:14px;color:#c2c7d0;font-size:16px;cursor:pointer}
  .hintcard .cta{text-align:right;margin-top:8px}
  .hintcard .cta button{background:none;border:0;color:var(--brand);font-size:15px;font-weight:700;cursor:pointer}
  .sec-title{padding:8px 20px 2px;font-size:19px;font-weight:800}
  .sec-sub{padding:0 20px;font-size:13px;color:var(--muted)}
  .acct{background:#fff;margin:10px 20px;border-radius:16px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
  .acct .an{font-size:17px;font-weight:800}.acct .no{font-size:13px;color:#9aa0ab;margin:2px 0 16px}
  .acct .foot{display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:700}

  /* Claude 風格對話 */
  .chat{padding:20px 20px 10px}
  .ai-msg{font-size:15.5px;line-height:1.75;color:var(--ink);margin:16px 0;animation:fade .4s ease}
  .ai-msg b{color:#111}
  .note{font-size:13px;color:var(--muted);background:#fff;border-radius:12px;padding:10px 13px;
    margin:12px 0;border-left:3px solid var(--brand-2);line-height:1.6;animation:fade .4s ease}
  .tagline{display:inline-block;background:var(--brand);color:#fff;font-size:12px;font-weight:700;
    padding:5px 12px;border-radius:20px;margin:8px 0;animation:fade .4s ease}
  .me-msg{display:flex;justify-content:flex-end;margin:16px 0;animation:fade .4s ease}
  .me-msg span{background:var(--user-bg);border-radius:14px;padding:10px 14px;font-size:15px;font-weight:600;max-width:84%;line-height:1.5}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .typing{display:flex;gap:4px;margin:16px 0;align-items:center}
  .typing .d{width:7px;height:7px;border-radius:50%;background:#b8bfca;animation:blink 1.2s infinite}
  .typing .d:nth-child(2){animation-delay:.2s}.typing .d:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}

  /* 圓餅圖 */
  .donutcard{background:#fff;border-radius:16px;padding:18px;margin:12px 0;display:flex;
    align-items:center;gap:18px;animation:fade .4s ease;box-shadow:0 2px 10px rgba(0,0,0,.04)}
  .donut{width:104px;height:104px;border-radius:50%;flex-shrink:0;position:relative;transition:background .5s ease}
  .donut .hole{position:absolute;inset:16px;background:#fff;border-radius:50%;display:grid;place-items:center;text-align:center}
  .donut .hv{font-size:22px;font-weight:800;color:var(--brand);line-height:1}
  .donut .hl{font-size:10px;color:var(--muted);margin-top:2px}
  .legend .li{display:flex;align-items:center;gap:8px;font-size:13px;margin:5px 0}
  .legend .dot{width:11px;height:11px;border-radius:3px}
  .legend .amt{margin-left:auto;font-weight:700}

  /* 控制區 */
  .controls{padding:8px 20px calc(18px + env(safe-area-inset-bottom));flex-shrink:0;
    background:linear-gradient(#f4f6f9cc,#f4f6f9);max-height:54%;overflow-y:auto}
  .controls:empty{display:none}
  .choice{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);
    color:var(--ink);font-size:15px;font-weight:600;padding:13px 15px;border-radius:13px;margin:8px 0;cursor:pointer;transition:.15s}
  .choice:hover{border-color:var(--brand)}
  .choice small{display:block;font-weight:400;font-size:12px;color:var(--muted);margin-top:2px}
  .choice.multi.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .choice.multi.on small{color:#dbe6ff}
  .cslider{background:#fff;border:1.5px solid var(--line);border-radius:13px;padding:14px;margin:8px 0}
  .cslider label{font-size:13.5px;font-weight:600;display:flex;justify-content:space-between;margin-bottom:12px}
  .cslider .val{color:var(--brand);font-weight:800;font-size:16px}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin:4px 0 8px}
  .chip{background:#fff;border:1.5px solid var(--line);color:var(--brand);font-size:13px;font-weight:600;
    padding:8px 13px;border-radius:20px;cursor:pointer;transition:.15s}
  .chip:hover{border-color:var(--brand);background:var(--brand-soft)}

  /* 獲利試算卡 */
  .calc{background:#fff;border-radius:16px;padding:18px;margin:12px 0;box-shadow:0 2px 10px rgba(0,0,0,.04);animation:fade .4s ease}
  .calc-title{font-size:12px;font-weight:700;color:var(--brand);margin-bottom:10px}
  .calc-head{font-size:14px;font-weight:700;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .calc-head b{color:var(--brand);font-size:19px}
  .calc-rows{margin-top:16px}
  .crow{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--line);font-size:13.5px}
  .crow:first-child{border-top:0}
  .crow.hi{background:var(--brand-soft);margin:0 -8px;padding:10px 8px;border-radius:10px;border-top:0}
  .cbar{width:11px;height:11px;border-radius:3px;flex-shrink:0}
  .cn{font-weight:700}.cn small{color:var(--muted);font-weight:600;margin-left:5px}
  .crow.hi .cn{color:var(--brand)}
  .cy{margin-left:auto;font-weight:800;color:var(--ink)}
  .cy small{color:var(--muted);font-weight:600;font-size:11px;margin-left:1px}
  .cd{width:82px;text-align:right;font-weight:700;color:#1f9d57;font-size:12.5px}
  .calc-note{font-size:11px;color:var(--muted);margin-top:13px}

  /* 商品卡 / 結束 */
  .risk{display:inline-block;font-size:11px;padding:2px 7px;border-radius:6px;font-weight:700}
  .r-low{background:#e6f5ec;color:#1f8a4c}.r-mid{background:#fff2df;color:#c47f14}.r-high{background:#fde8e8;color:#c53a3a}
  .prod{border:1px solid var(--line);border-radius:14px;padding:13px;margin:10px 0;background:#fff}
  .prod .ph{display:flex;justify-content:space-between;align-items:flex-start}
  .prod .pn{font-size:14.5px;font-weight:800}
  .prod .tag{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--brand-soft);color:var(--brand);font-weight:700;white-space:nowrap}
  .prod .yield{font-size:20px;font-weight:800;color:var(--brand);margin:4px 0}
  .prod .yield small{font-size:11px;color:#9aa;font-weight:600;margin-left:4px}
  .prod .meta{font-size:12px;color:var(--muted);line-height:1.5}
  .endcard{text-align:center;padding:22px 14px;background:#fff;border-radius:16px;margin:14px 0}
  .endcard .ic{font-size:40px}.endcard .t{font-size:17px;font-weight:800;margin:8px 0 4px}
  .endcard .d{font-size:13px;color:var(--muted);line-height:1.6}
  .summary{text-align:left;background:var(--brand-soft);border-radius:12px;padding:12px 14px;margin:14px 0 4px;font-size:13px;line-height:1.9}
  .summary b{color:var(--brand)}
  .compare{display:flex;gap:10px;margin:12px 0;animation:fade .4s ease}
  .cmpcol{flex:1;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
  .cmph{font-size:15px;font-weight:800;color:var(--brand);text-align:center;padding-bottom:8px;border-bottom:2px solid var(--brand-soft);margin-bottom:4px}
  .cmpr{font-size:12px;color:var(--ink);padding:7px 0;line-height:1.4;border-top:1px solid #f2f4f7}
  .cmpr span{display:block;color:var(--muted);font-size:10.5px;margin-bottom:1px}
  .inputbar{display:flex;gap:8px;align-items:center;background:#fff;border-top:1px solid var(--line);
    padding:10px 14px calc(10px + env(safe-area-inset-bottom));flex-shrink:0}
  .inputbar input{flex:1;border:1.5px solid var(--line);border-radius:22px;padding:11px 16px;font-size:14.5px;outline:none;font-family:inherit}
  .inputbar input:focus{border-color:var(--brand)}
  .inputbar button{width:42px;height:42px;border-radius:50%;border:0;background:var(--brand);color:#fff;font-size:15px;cursor:pointer;flex-shrink:0}
  .disclaimer{font-size:10.5px;color:var(--muted);text-align:center;padding:7px 16px;background:#f4f6f9}
</style>
</head>
<body>
<div class="phone">
  <button class="reset" onclick="resetAll()">↺ 重新開始</button>
  <div class="statusbar"><span>8:14</span><span class="r">••• 5G ▮</span></div>
  <div class="prog"><div id="progbar"></div></div>
  <div class="screen" id="screen"></div>
  <div class="controls" id="controls"></div>
  <div class="inputbar" id="inputbar" style="display:none">
    <input id="chatInput" placeholder="輸入您的想法，或點選上方選項…" autocomplete="off">
    <button id="chatSend" aria-label="送出">➤</button>
  </div>
  <div class="disclaimer">本頁資訊與數據僅供參考與說明用途，不構成投資建議；投資均有風險，實際商品內容以正式文件為準。</div>
</div>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
