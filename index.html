<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>凱基致富管家 — 對話流程原型</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
  <button class="reset" onclick="resetAll()">↺ 重新開始</button>
  <div class="screen" id="screen"></div>
  <div class="controls" id="controls"></div>
  <div class="inputbar" id="inputbar" style="display:none">
    <input id="chatInput" placeholder="暫時不開放使用，請點選上方選項" autocomplete="off" disabled>
    <button id="chatSend" aria-label="送出" disabled>➤</button>
  </div>
  <div class="disclaimer">本頁資訊與數據僅供參考與說明用途，不構成投資建議；投資均有風險，實際商品內容以正式文件為準。</div>
</div>
<!-- 共用層：積木、狀態、連接流程、商品資料（三人共用，PR 需 review） -->
<script src="js/engine.js"></script>
<script src="js/catalog.js"></script>
<script src="js/flow.js"></script>
<!-- 內容層：各自負責一種使用者屬性的推薦內容，可獨立編輯、獨立提 PR -->
<script src="js/content-attr-a.js"></script> <!-- 負責人 A：屬性 A 成長潛力型（基金） -->
<script src="js/content-attr-b.js"></script> <!-- 負責人 B：屬性 B 穩健收息型（債券） -->
<script src="js/content-attr-c.js"></script> <!-- 負責人 C：屬性 C 保本安穩型（定存） -->
<!-- App 啟動（最後載入） -->
<script src="js/bootstrap.js"></script>
</body>
</html>
