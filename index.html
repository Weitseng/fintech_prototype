<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧理財體驗 — 展場互動原型</title>
<style>
  :root{
    --brand:#1854d6; --brand-2:#3b74f0; --brand-soft:#eaf1ff;
    --ink:#1b1b19; --muted:#7a7f88; --line:#e9ebee; --bg:#f4f6f9;
    --user-bg:#f0efea; --idle:#dfe4ee; --shadow:0 12px 44px rgba(20,40,90,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    background:linear-gradient(135deg,#1a3a7a,#3b74f0);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px;color:var(--ink)}
  .phone{width:390px;max-width:100%;height:820px;max-height:94vh;background:var(--bg);
    border-radius:40px;box-shadow:var(--shadow);overflow:hidden;position:relative;
    display:flex;flex-direction:column;border:11px solid #10131a}
  .statusbar{height:34px;background:#f4f6f9;display:flex;align-items:center;
    justify-content:space-between;padding:0 22px;font-size:13px;font-weight:700;flex-shrink:0}
  .statusbar .r{font-size:11px}
  .prog{height:3px;background:#e2e6ee;flex-shrink:0}
  .prog>div{height:100%;background:var(--brand);width:0;transition:width .4s ease}
  .reset{position:absolute;top:8px;right:14px;z-index:30;font-size:11px;
    background:rgba(0,0,0,.06);border:0;color:#333;padding:6px 10px;border-radius:20px;cursor:pointer}
  .screen{flex:1;overflow-y:auto;scroll-behavior:smooth}
  .screen::-webkit-scrollbar{width:0}

  /* 選擇頁 */
  .selpage{padding:26px 22px 22px}
  .selpage .kicker{font-size:12px;font-weight:700;color:var(--brand);letter-spacing:.05em}
  .selpage h1{font-size:23px;font-weight:800;margin:6px 0 4px;line-height:1.3}
  .selpage .lead{font-size:13.5px;color:var(--muted);margin-bottom:22px;line-height:1.6}
  .selpage .q{font-size:14px;font-weight:700;margin:22px 0 10px}
  .opt{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);
    color:var(--ink);font-size:15px;font-weight:600;padding:15px 16px;border-radius:14px;margin:9px 0;cursor:pointer;transition:.15s}
  .opt:hover{border-color:var(--brand)}
  .opt.sel{border-color:var(--brand);background:var(--brand-soft);color:var(--brand)}
  .slider-wrap{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:16px}
  .slider-wrap label{font-size:14px;font-weight:600;display:flex;justify-content:space-between;margin-bottom:14px}
  .slider-wrap .val{color:var(--brand);font-weight:800;font-size:18px}
  input[type=range]{width:100%;height:6px;border-radius:6px;appearance:none;
    background:linear-gradient(90deg,var(--brand) var(--fill,50%),#dde3ee var(--fill,50%));outline:none}
  input[type=range]::-webkit-slider-thumb{appearance:none;width:28px;height:28px;border-radius:50%;
    background:#fff;border:4px solid var(--brand);box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:pointer}
  .primary{width:100%;background:#f0c000;color:#fff;border:0;font-size:16px;font-weight:700;
    padding:16px;border-radius:14px;cursor:pointer;margin-top:22px}
  .primary:hover{background:#c9a000}
  .primary:disabled{opacity:.35;cursor:not-allowed}

  /* 銀行 App 首頁 */
  .apphead{padding:14px 20px 4px}
  .apptop{display:flex;align-items:center;justify-content:space-between}
  .apptop h2{font-size:26px;font-weight:800}
  .apptop .icons{display:flex;gap:16px;font-size:19px}
  .apptop .icons .bell{position:relative}
  .apptop .icons .bell::after{content:"";position:absolute;top:-1px;right:-2px;width:7px;height:7px;background:#f24;border-radius:50%}
  .tabs{display:flex;gap:8px;padding:14px 20px 4px;overflow-x:auto}.tabs::-webkit-scrollbar{height:0}
  .tab{font-size:15px;font-weight:700;color:#8b93a1;padding:9px 15px;border-radius:22px;white-space:nowrap;cursor:pointer}
  .tab.on{background:var(--brand);color:#fff}.tab.on .ic{margin-right:4px}
  .seg{display:flex;background:#e4e9f2;border-radius:14px;margin:14px 20px;padding:4px}
  .seg div{flex:1;text-align:center;padding:11px;border-radius:11px;font-size:15px;font-weight:700;color:#7a8091;cursor:pointer}
  .seg div.on{background:#fff;color:var(--brand);box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .total{text-align:center;margin:16px 0 6px}
  .total .k{font-size:13px;color:var(--muted)}
  .total .v{font-size:26px;font-weight:800;letter-spacing:2px;margin-top:4px}
  .total .v small{font-size:15px;font-weight:700;margin-right:6px;letter-spacing:0}
  .hintcard{background:#fff;margin:14px 20px;border-radius:18px;padding:16px 16px 12px;
    box-shadow:0 4px 18px rgba(20,40,90,.08);position:relative;animation:glow 2.4s infinite}
  @keyframes glow{50%{box-shadow:0 0 0 4px rgba(24,84,214,.14)}}
  .hintcard .top{display:flex;gap:11px}
  .hintcard .bot{width:34px;height:34px;border-radius:10px;flex-shrink:0;
    background:linear-gradient(135deg,#3b74f0,#7aa7ff);display:grid;place-items:center;font-size:18px}
  .hintcard .msg{font-size:14.5px;line-height:1.6;color:#2a2f38;flex:1}
  .hintcard .x{position:absolute;top:12px;right:14px;color:#c2c7d0;font-size:16px;cursor:pointer}
  .hintcard .cta{text-align:right;margin-top:8px}
  .hintcard .cta button{background:none;border:0;color:var(--brand);font-size:15px;font-weight:700;cursor:pointer}
  .sec-title{padding:8px 20px 2px;font-size:19px;font-weight:800}
  .sec-sub{padding:0 20px;font-size:13px;color:var(--muted)}
  .acct{background:#fff;margin:10px 20px;border-radius:16px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
  .acct .an{font-size:17px;font-weight:800}.acct .no{font-size:13px;color:#9aa0ab;margin:2px 0 16px}
  .acct .foot{display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:700}

  /* Claude 風格對話 */
  .chat{padding:20px 20px 10px}
  .ai-msg{font-size:15.5px;line-height:1.75;color:var(--ink);margin:16px 0;animation:fade .4s ease}
  .ai-msg b{color:#111}
  .note{font-size:13px;color:var(--muted);background:#fff;border-radius:12px;padding:10px 13px;
    margin:12px 0;border-left:3px solid var(--brand-2);line-height:1.6;animation:fade .4s ease}
  .tagline{display:inline-block;background:var(--brand);color:#fff;font-size:12px;font-weight:700;
    padding:5px 12px;border-radius:20px;margin:8px 0;animation:fade .4s ease}
  .me-msg{display:flex;justify-content:flex-end;margin:16px 0;animation:fade .4s ease}
  .me-msg span{background:var(--user-bg);border-radius:14px;padding:10px 14px;font-size:15px;font-weight:600;max-width:84%;line-height:1.5}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .typing{display:flex;gap:4px;margin:16px 0;align-items:center}
  .typing .d{width:7px;height:7px;border-radius:50%;background:#b8bfca;animation:blink 1.2s infinite}
  .typing .d:nth-child(2){animation-delay:.2s}.typing .d:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}

  /* 圓餅圖 */
  .donutcard{background:#fff;border-radius:16px;padding:18px;margin:12px 0;display:flex;
    align-items:center;gap:18px;animation:fade .4s ease;box-shadow:0 2px 10px rgba(0,0,0,.04)}
  .donut{width:104px;height:104px;border-radius:50%;flex-shrink:0;position:relative;transition:background .5s ease}
  .donut .hole{position:absolute;inset:16px;background:#fff;border-radius:50%;display:grid;place-items:center;text-align:center}
  .donut .hv{font-size:22px;font-weight:800;color:var(--brand);line-height:1}
  .donut .hl{font-size:10px;color:var(--muted);margin-top:2px}
  .legend .li{display:flex;align-items:center;gap:8px;font-size:13px;margin:5px 0}
  .legend .dot{width:11px;height:11px;border-radius:3px}
  .legend .amt{margin-left:auto;font-weight:700}

  /* 控制區 */
  .controls{padding:8px 20px calc(18px + env(safe-area-inset-bottom));flex-shrink:0;
    background:linear-gradient(#f4f6f9cc,#f4f6f9);max-height:54%;overflow-y:auto}
  .controls:empty{display:none}
  .choice{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);
    color:var(--ink);font-size:15px;font-weight:600;padding:13px 15px;border-radius:13px;margin:8px 0;cursor:pointer;transition:.15s}
  .choice:hover{border-color:var(--brand)}
  .choice small{display:block;font-weight:400;font-size:12px;color:var(--muted);margin-top:2px}
  .choice.multi.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .choice.multi.on small{color:#dbe6ff}
  .cslider{background:#fff;border:1.5px solid var(--line);border-radius:13px;padding:14px;margin:8px 0}
  .cslider label{font-size:13.5px;font-weight:600;display:flex;justify-content:space-between;margin-bottom:12px}
  .cslider .val{color:var(--brand);font-weight:800;font-size:16px}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin:4px 0 8px}
  .chip{background:#fff;border:1.5px solid var(--line);color:var(--brand);font-size:13px;font-weight:600;
    padding:8px 13px;border-radius:20px;cursor:pointer;transition:.15s}
  .chip:hover{border-color:var(--brand);background:var(--brand-soft)}

  /* 獲利試算卡 */
  .calc{background:#fff;border-radius:16px;padding:18px;margin:12px 0;box-shadow:0 2px 10px rgba(0,0,0,.04);animation:fade .4s ease}
  .calc-title{font-size:12px;font-weight:700;color:var(--brand);margin-bottom:10px}
  .calc-head{font-size:14px;font-weight:700;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .calc-head b{color:var(--brand);font-size:19px}
  .calc-rows{margin-top:16px}
  .crow{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--line);font-size:13.5px}
  .crow:first-child{border-top:0}
  .crow.hi{background:var(--brand-soft);margin:0 -8px;padding:10px 8px;border-radius:10px;border-top:0}
  .cbar{width:11px;height:11px;border-radius:3px;flex-shrink:0}
  .cn{font-weight:700}.cn small{color:var(--muted);font-weight:600;margin-left:5px}
  .crow.hi .cn{color:var(--brand)}
  .cy{margin-left:auto;font-weight:800;color:var(--ink)}
  .cy small{color:var(--muted);font-weight:600;font-size:11px;margin-left:1px}
  .cd{width:82px;text-align:right;font-weight:700;color:#1f9d57;font-size:12.5px}
  .calc-note{font-size:11px;color:var(--muted);margin-top:13px}

  /* 商品卡 / 結束 */
  .risk{display:inline-block;font-size:11px;padding:2px 7px;border-radius:6px;font-weight:700}
  .r-low{background:#e6f5ec;color:#1f8a4c}.r-mid{background:#fff2df;color:#c47f14}.r-high{background:#fde8e8;color:#c53a3a}
  .prod{border:1px solid var(--line);border-radius:14px;padding:13px;margin:10px 0;background:#fff}
  .prod .ph{display:flex;justify-content:space-between;align-items:flex-start}
  .prod .pn{font-size:14.5px;font-weight:800}
  .prod .tag{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--brand-soft);color:var(--brand);font-weight:700;white-space:nowrap}
  .prod .yield{font-size:20px;font-weight:800;color:var(--brand);margin:4px 0}
  .prod .yield small{font-size:11px;color:#9aa;font-weight:600;margin-left:4px}
  .prod .meta{font-size:12px;color:var(--muted);line-height:1.5}
  .endcard{text-align:center;padding:22px 14px;background:#fff;border-radius:16px;margin:14px 0}
  .endcard .ic{font-size:40px}.endcard .t{font-size:17px;font-weight:800;margin:8px 0 4px}
  .endcard .d{font-size:13px;color:var(--muted);line-height:1.6}
  .summary{text-align:left;background:var(--brand-soft);border-radius:12px;padding:12px 14px;margin:14px 0 4px;font-size:13px;line-height:1.9}
  .summary b{color:var(--brand)}
  .compare{display:flex;gap:10px;margin:12px 0;animation:fade .4s ease}
  .cmpcol{flex:1;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
  .cmph{font-size:15px;font-weight:800;color:var(--brand);text-align:center;padding-bottom:8px;border-bottom:2px solid var(--brand-soft);margin-bottom:4px}
  .cmpr{font-size:12px;color:var(--ink);padding:7px 0;line-height:1.4;border-top:1px solid #f2f4f7}
  .cmpr span{display:block;color:var(--muted);font-size:10.5px;margin-bottom:1px}
  .inputbar{display:flex;gap:8px;align-items:center;background:#fff;border-top:1px solid var(--line);
    padding:10px 14px calc(10px + env(safe-area-inset-bottom));flex-shrink:0}
  .inputbar input{flex:1;border:1.5px solid var(--line);border-radius:22px;padding:11px 16px;font-size:14.5px;outline:none;font-family:inherit}
  .inputbar input:focus{border-color:var(--brand)}
  .inputbar button{width:42px;height:42px;border-radius:50%;border:0;background:var(--brand);color:#fff;font-size:15px;cursor:pointer;flex-shrink:0}
  .disclaimer{font-size:10.5px;color:var(--muted);text-align:center;padding:7px 16px;background:#f4f6f9}
</style>
</head>
<body>
<div class="phone">
  <button class="reset" onclick="resetAll()">↺ 重新開始</button>
  <div class="statusbar"><span>8:14</span><span class="r">••• 5G ▮</span></div>
  <div class="prog"><div id="progbar"></div></div>
  <div class="screen" id="screen"></div>
  <div class="controls" id="controls"></div>
  <div class="inputbar" id="inputbar" style="display:none">
    <input id="chatInput" placeholder="輸入您的想法，或點選上方選項…" autocomplete="off">
    <button id="chatSend" aria-label="送出">➤</button>
  </div>
  <div class="disclaimer">本頁資訊與數據僅供參考與說明用途，不構成投資建議；投資均有風險，實際商品內容以正式文件為準。</div>
</div>
<script>
/* ================= 商品假資料 ================= */
const PRODUCTS={
  bond:[
    {n:"精選投資級公司債 A",tag:"債券",y:"4.2%",r:"mid",rt:"低–中風險",fit:"把錢借給信用良好的企業，定期領固定利息。"},
    {n:"政府公債 B",tag:"債券",y:"3.1%",r:"low",rt:"低風險",fit:"政府發行、波動極小，資產的壓艙石。"},
    {n:"高評級金融債 C",tag:"債券",y:"4.8%",r:"mid",rt:"中風險",fit:"想比定存好、可接受小波動的選擇。"},
  ],
  fund:[
    {n:"平衡型基金 D",tag:"基金",y:"5–7%",r:"mid",rt:"中風險",fit:"股債各半、經理人動態配置，兼顧成長與配息。"},
    {n:"全球股票基金 E",tag:"基金",y:"8–10%",r:"high",rt:"中–高風險",fit:"參與全球龍頭成長，適合追求長期報酬。"},
    {n:"目標到期債券基金 F",tag:"基金",y:"約 5%",r:"mid",rt:"中風險",fit:"一籃子債券由專家代操，省去自己挑券。"},
  ],
  deposit:[
    {n:"數位帳戶高利活存 H",tag:"高利活存",y:"2.0%",r:"low",rt:"極低風險",fit:"隨時可動用又比一般活存高，資金停泊首選。"},
    {n:"一年期定存 G",tag:"定存",y:"1.6%",r:"low",rt:"極低風險",fit:"綁一年、利率確定，適合短期不動用的資金。"},
    {n:"外幣優利定存 I",tag:"外幣定存",y:"3.0%",r:"low",rt:"低風險(含匯率)",fit:"有外幣需求、可接受匯率波動的人。"},
  ]
};
/* 商品分類設定：試算情境 + 清單 + 名稱 */
const RECO={
  '高利活存':{name:'本行高利活存',calcTitle:'高利活存 · 年收益試算',
    scen:[['一般活存',0.2],['一年期定存',1.6],['高利活存',2.0]],hi:2,list:'deposit',
    lead:'在保留隨時動用彈性的同時，提供高於一般活存的利率，適合作為短期資金的停泊處。'},
  '債券':{name:'本行債券商品',calcTitle:'債券 · 年收益試算',
    scen:[['一般活存',0.2],['一年期定存',1.6],['投資級債券',4.2]],hi:2,list:'bond',
    lead:'配息通常高於活存與定存，價格波動一般小於股票，屬於相對穩健的工具，惟仍有信用與利率風險。'},
  '基金':{name:'本行基金組合',calcTitle:'基金 · 報酬試算',
    scen:[['一年期定存',1.6],['投資級債券',4.2],['平衡型基金(市場平均)',6.0]],hi:2,list:'fund',
    lead:'由專業機構管理並分散投資，長期平均報酬通常高於定存，惟淨值會隨市場波動，不保證收益。'},
};

let S={};
const screen=()=>document.getElementById('screen');
const ctrls=()=>document.getElementById('controls');
const setProgress=p=>document.getElementById('progbar').style.width=p+'%';
const down=()=>{const s=screen();s.scrollTop=s.scrollHeight;};
function setControls(node){freeOverride=null;const c=ctrls();c.innerHTML='';if(node)c.appendChild(node);down();}
function clearControls(){ctrls().innerHTML='';}
function wrap(){return document.createElement('div');}
const isHigh=()=>S.assetRange==='200 萬以上';               // ≥200萬
function assetMid(){return {'100 萬以下':800000,'100 萬 – 200 萬':1500000,'200 萬以上':3200000}[S.assetRange]||1000000;}

function resetAll(){
  S={assetRange:null,ratio:50,q1:null,q2:null,q3:null,depositWeight:'mid',reco:null,otherAmt:null,otherRatio:null};
  clearControls();setProgress(0);step1();
}

/* ================= 階段一 互動一：純選擇頁 ================= */
function step1(){
  setProgress(8);clearControls();hideInput();
  const p=wrap();p.className='selpage';
  p.innerHTML=`
    <div class="kicker">智慧理財 · 資產健檢</div>
    <h1>先了解您的資產概況</h1>
    <div class="lead">請提供您的資產概況，我們將為您進行初步分析。</div>
    <div class="q">1. 您目前可運用的資產大約多少？</div>
    <div id="rangeOpts"></div>
    <div class="q">2. 其中已投入投資的比例大約是？</div>
    <div class="slider-wrap"><label>投資占比 <span class="val" id="rv">50%</span></label>
      <input type="range" min="0" max="100" step="5" value="50" id="rr"></div>
    <button class="primary" id="startBtn" disabled>開始分析 →</button>`;
  screen().innerHTML='';screen().appendChild(p);
  const ro=p.querySelector('#rangeOpts');
  ['100 萬以下','100 萬 – 200 萬','200 萬以上'].forEach(x=>{
    const b=document.createElement('button');b.className='opt';b.textContent=x;
    b.onclick=()=>{ro.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
      b.classList.add('sel');S.assetRange=x;startBtn.disabled=false;};
    ro.appendChild(b);
  });
  const rr=p.querySelector('#rr'),rv=p.querySelector('#rv'),startBtn=p.querySelector('#startBtn');
  const upd=()=>{rv.textContent=rr.value+'%';rr.style.setProperty('--fill',rr.value+'%');S.ratio=+rr.value;};
  rr.oninput=upd;upd();
  startBtn.onclick=()=>step2();
}

/* ================= 階段一：銀行 App 首頁 ================= */
function step2(){
  setProgress(18);clearControls();
  const s=screen();s.innerHTML='';const v=wrap();
  v.innerHTML=`
    <div class="apphead"><div class="apptop"><h2>帳務</h2>
      <div class="icons"><span class="bell">🔔</span><span>🔍</span><span>▣</span></div></div></div>
    <div class="tabs"><div class="tab">帳務總覽</div><div class="tab on"><span class="ic">＄</span>存款</div>
      <div class="tab">信用卡</div><div class="tab">投資</div><div class="tab">貸款</div></div>
    <div class="seg"><div class="on">臺幣</div><div>外幣</div></div>
    <div class="total"><div class="k">存款總額</div><div class="v"><small>NTD</small>＊＊＊＊ 👁</div></div>
    <div class="hintcard"><span class="x">✕</span>
      <div class="top"><div class="bot">🤖</div>
        <div class="msg">發現你帳戶有筆資金默默躺了一個月，要不要撥一點做「定期定額」或「高股息投資」，把這些閒置資產活化起來！</div></div>
      <div class="cta"><button id="learnBtn">我想了解 ›</button></div></div>
    <div class="sec-title">臺幣存款</div>
    <div class="sec-sub">臺幣總計 2 筆　NTD ＊＊＊＊</div>
    <div class="acct"><div class="an">無摺綜</div><div class="no">60388000008997</div>
      <div class="foot"><span>🇹🇼 臺幣</span><span>NTD ＊＊＊＊ ›</span></div></div>
    <div class="acct"><div class="an">數位活儲</div><div class="no">60388000012345</div>
      <div class="foot"><span>🇹🇼 臺幣</span><span>NTD ＊＊＊＊ ›</span></div></div>`;
  s.appendChild(v);
  v.querySelector('#learnBtn').onclick=()=>enterChat();
  v.querySelector('.x').onclick=()=>{v.querySelector('.hintcard').style.display='none';};
}

/* ================= 對話輔助 ================= */
let chatBox=null,activeChoices=[],freeOverride=null,suppressNextEcho=false;
function enterChat(){setProgress(28);showInput();activeChoices=[];const s=screen();s.innerHTML='';
  chatBox=wrap();chatBox.className='chat';s.appendChild(chatBox);ch_reveal();}
function aiSay(msgs,done){
  let i=0;(function next(){
    if(i>=msgs.length){if(done)done();return;}
    const t=document.createElement('div');t.className='typing';
    t.innerHTML='<span class="d"></span><span class="d"></span><span class="d"></span>';
    chatBox.appendChild(t);down();
    setTimeout(()=>{t.remove();const m=document.createElement('div');m.className='ai-msg';
      m.innerHTML=msgs[i];chatBox.appendChild(m);down();i++;setTimeout(next,300);},620);
  })();
}
function note(html){const n=document.createElement('div');n.className='note';n.innerHTML=html;chatBox.appendChild(n);down();}
function tagline(text){const t=document.createElement('div');t.className='tagline';t.textContent=text;chatBox.appendChild(t);down();}
function meSay(text){if(suppressNextEcho){suppressNextEcho=false;return;}
  const m=document.createElement('div');m.className='me-msg';m.innerHTML='<span>'+text+'</span>';chatBox.appendChild(m);down();}
function choiceBtn(label,sub,onClick,multi,keywords){const b=document.createElement('button');
  b.className='choice'+(multi?' multi':'');b.innerHTML=label+(sub?'<small>'+sub+'</small>':'');
  b.onclick=()=>onClick(b);
  if(keywords)activeChoices.push({el:b,keywords});
  return b;}
/* ---- 限縮式自由輸入引擎 ---- */
function showInput(){const b=document.getElementById('inputbar');if(b)b.style.display='flex';}
function hideInput(){const b=document.getElementById('inputbar');if(b)b.style.display='none';const ci=document.getElementById('chatInput');if(ci)ci.value='';}
function matchChoices(text){const live=activeChoices.filter(c=>document.body.contains(c.el));
  for(const c of live){if((c.keywords||[]).some(k=>text.includes(k)))return c;}return null;}
function clarify(){aiSay(["為了幫您快速聚焦，您的想法比較接近下方哪一個選項呢？您可以直接點選，或換個說法再告訴我。"]);}
function handleFree(text){
  if(freeOverride){meSay(text);const h=freeOverride;freeOverride=null;h(text);return;}
  const c=matchChoices(text);
  if(c){meSay(text);suppressNextEcho=true;c.el.click();return;}
  meSay(text);clarify();
}
function addDonut(investedPct,amount,id){
  const idle=100-investedPct;const card=document.createElement('div');card.className='donutcard';if(id)card.id=id;
  const inv=Math.round(amount*investedPct/100),idl=amount-inv;
  card.innerHTML=`<div class="donut" style="background:conic-gradient(var(--brand) 0 ${investedPct}%,var(--idle) ${investedPct}% 100%)">
      <div class="hole"><div><div class="hv">${idle}%</div><div class="hl">閒置</div></div></div></div>
    <div class="legend">
      <div class="li"><span class="dot" style="background:var(--brand)"></span>已投資<span class="amt">$${inv.toLocaleString()}</span></div>
      <div class="li"><span class="dot" style="background:var(--idle)"></span>閒置活存<span class="amt">$${idl.toLocaleString()}</span></div>
    </div>`;
  chatBox.appendChild(card);down();return card;
}
function refreshDonut(id,investedPct,amount){
  const c=document.getElementById(id);if(!c)return;const idle=100-investedPct;
  const inv=Math.round(amount*investedPct/100),idl=amount-inv;
  c.querySelector('.donut').style.background=`conic-gradient(var(--brand) 0 ${investedPct}%,var(--idle) ${investedPct}% 100%)`;
  c.querySelector('.hv').textContent=idle+'%';
  const a=c.querySelectorAll('.amt');a[0].textContent='$'+inv.toLocaleString();a[1].textContent='$'+idl.toLocaleString();
}

/* ================= 階段一 互動二：閒置資金 + 風險承受 ================= */
function ch_reveal(){
  const idle=100-S.ratio;
  aiSay(["您好，我是智慧理財助理。我先依您的帳戶概況進行初步分析。"],()=>{
    setTimeout(()=>{
      addDonut(S.ratio,assetMid());
      aiSay([`分析完成。您目前約有 <b>${idle}%</b> 的資金以活存形式持有，活存利率通常低於定存與多數投資工具。`,
        "接下來用三個簡短問題，幫您釐清較適合的方向。"],()=>ch_q1());
    },700);
  });
}
/* Q1 現金流需求 → 決定存款佔比 */
function ch_q1(){
  setProgress(46);
  aiSay(["Q1. 這筆資金，您預期多久內可能會用到？"],()=>{
    const w=wrap();
    const o=[
      ['3 個月內','','high',['3個月','三個月','很快','馬上','短期','隨時','近期']],
      ['半年到一年','','mid',['半年','一年','1年','年內','中期']],
      ['一年以上都用不到','','low',['一年以上','1年以上','很久','長期','不會用','都用不到','放很久']],
      ['沒特別想過','','mid',['沒想','不確定','不知道','沒特別','沒差','都可以']],
    ];
    o.forEach(([l,s,wt,kw])=>w.appendChild(choiceBtn(l,s,()=>{S.q1=l;S.depositWeight=wt;meSay(l);clearControls();ch_q2();},false,kw)));
    setControls(w);
  });
}
/* Q2 風險承受度 → 決定是否進入投資型商品 */
function ch_q2(){
  setProgress(60);
  aiSay(["Q2. 如果短期出現帳面小幅波動，您會？"],()=>{
    const w=wrap();
    w.appendChild(choiceBtn('要保本，不能有波動',null,()=>{S.q2='保本';meSay('要保本，不能有波動');clearControls();offerDeeper();},false,['保本','不能','不要波動','不想虧','零風險','安全','不能虧','怕']));
    w.appendChild(choiceBtn('小波動可以接受',null,()=>{S.q2='低波動';meSay('小波動可以接受');clearControls();ch_q3();},false,['小波動','可以接受','還好','一點點','小幅','ok','OK','接受','小']));
    w.appendChild(choiceBtn('為了更高報酬，可接受中度波動',null,()=>{S.q2='中波動';meSay('可接受中度波動');clearControls();ch_q3();},false,['中度','高報酬','沒問題','敢','波動沒關係','中等','可以波動','衝']));
    setControls(w);
  });
}

/* Q3 債券/基金偏好 → 決定產品線（僅在 Q2 非保本時觸發） */
function ch_q3(){
  setProgress(74);
  aiSay(["Q3. 如果要考慮投資型商品，您比較重視哪一項？"],()=>{
    const w=wrap();
    w.appendChild(choiceBtn('到期領回金額確定、想鎖住現在利率','傾向債券',()=>{S.q3='債券';meSay('想鎖住利率、到期領回確定');clearControls();offerDeeper();},false,['鎖','到期','確定','固定','領回','利率','債']));
    w.appendChild(choiceBtn('想要成長潛力，能接受淨值持續波動','傾向基金',()=>{S.q3='基金';meSay('想要成長、能接受波動');clearControls();offerDeeper();},false,['成長','潛力','淨值','波動','基金','賺','漲']));
    w.appendChild(choiceBtn('都可以，想先看比較','債券 vs 基金對比',()=>{S.q3='比較';meSay('想先看比較');clearControls();compareCard();},false,['都可以','比較','看看','先看','不確定','兩個','差別','不知道']));
    setControls(w);
  });
}
/* 債券 vs 基金 對比卡片（Q3 選「都可以」時） */
function compareCard(){
  aiSay(["這是債券與基金的重點比較，供您參考："],()=>{
    const c=document.createElement('div');c.className='compare';
    c.innerHTML=`
      <div class="cmpcol"><div class="cmph">債券</div>
        <div class="cmpr"><span>收益方式</span>固定配息</div>
        <div class="cmpr"><span>價格波動</span>相對較低</div>
        <div class="cmpr"><span>到期</span>領回金額確定</div>
        <div class="cmpr"><span>適合</span>想鎖利率、要穩定現金流</div></div>
      <div class="cmpcol"><div class="cmph">基金</div>
        <div class="cmpr"><span>收益方式</span>淨值成長／配息</div>
        <div class="cmpr"><span>價格波動</span>中等</div>
        <div class="cmpr"><span>到期</span>無固定、可隨時申贖</div>
        <div class="cmpr"><span>適合</span>想要成長、能接受波動</div></div>`;
    chatBox.appendChild(c);down();
    aiSay(["看完之後，您比較傾向哪一個方向？"],()=>{
      const w=wrap();
      w.appendChild(choiceBtn('債券方向',null,()=>{S.q3='債券';meSay('債券方向');clearControls();offerDeeper();},false,['債','鎖','固定','穩','領回']));
      w.appendChild(choiceBtn('基金方向',null,()=>{S.q3='基金';meSay('基金方向');clearControls();offerDeeper();},false,['基金','成長','波動','漲','潛力']));
      setControls(w);
    });
  });
}
/* 更進一步（選填）：他行資產，納入整體分析 */
function offerDeeper(){
  setProgress(80);
  aiSay(["在提供配置建議前，若您願意補充在其他金融機構的資產，我可以納入整體、給更完整的分析。"],()=>{
    const w=wrap();
    w.appendChild(choiceBtn("好，補充他行資產做更完整分析",null,()=>{meSay('補充他行資產');clearControls();otherAssets();},false,['好','補充','願意','可以','要','他行','其他','完整','更']));
    w.appendChild(choiceBtn("不用，直接看結果",null,()=>{meSay('直接看結果');clearControls();resolveReco();},false,['不用','不','直接','看結果','跳過','沒有','免','快']));
    setControls(w);
  });
}
function otherMid(){return {'50 萬以下':350000,'50–100 萬':750000,'100–300 萬':2000000,'300 萬以上':4000000}[S.otherAmt]||1000000;}
function otherAssets(){
  setProgress(84);
  aiSay(["您在其他金融機構的資產大約多少？"],()=>{
    const w=wrap();const chips=document.createElement('div');chips.className='chips';
    ['50 萬以下','50–100 萬','100–300 萬','300 萬以上'].forEach(x=>{
      const c=document.createElement('button');c.className='chip';c.textContent=x;
      c.onclick=()=>{S.otherAmt=x;meSay(x);clearControls();otherRatio();};chips.appendChild(c);});
    w.appendChild(chips);setControls(w);
    freeOverride=(t)=>{const n=parseInt(t.replace(/[^\d]/g,''));let picked=null;
      if(!isNaN(n)){const wan=n>=10000?n/10000:n;
        picked=wan<50?'50 萬以下':wan<100?'50–100 萬':wan<300?'100–300 萬':'300 萬以上';}
      const hit=picked&&[...chips.children].find(c=>c.textContent===picked);
      if(hit){suppressNextEcho=true;hit.click();return;}clarify();};
  });
}
function otherRatio(){
  setProgress(87);
  aiSay(["其中已投入投資的比例大約是？（下方圖表會同步更新）"],()=>{
    addDonut(50,otherMid(),'liveDonut');
    const w=wrap();w.innerHTML=`<div class="cslider">
      <label>他行投資占比 <span class="val" id="rv2">50%</span></label>
      <input type="range" min="0" max="100" step="5" value="50" id="rr2"></div>`;
    const nx=document.createElement('button');nx.className='primary';nx.style.marginTop='8px';nx.textContent='完成';
    w.appendChild(nx);setControls(w);
    const rr=w.querySelector('#rr2'),rv=w.querySelector('#rv2');
    const upd=()=>{rv.textContent=rr.value+'%';rr.style.setProperty('--fill',rr.value+'%');S.otherRatio=+rr.value;
      refreshDonut('liveDonut',S.otherRatio,otherMid());};
    rr.oninput=upd;upd();
    nx.onclick=()=>{meSay('他行投資約 '+S.otherRatio+'%');clearControls();resolveReco();};
    freeOverride=(t)=>{const n=parseInt(t.replace(/[^\d]/g,''));
      if(!isNaN(n)){S.otherRatio=Math.max(0,Math.min(100,n));
        rr.value=S.otherRatio;rr.style.setProperty('--fill',S.otherRatio+'%');rv.textContent=S.otherRatio+'%';
        refreshDonut('liveDonut',S.otherRatio,otherMid());clearControls();resolveReco();}
      else clarify();};
  });
}
/* 綜合三題（＋選填他行資產），決定產品線與配置建議 */
function resolveReco(){
  setProgress(90);
  if(S.q2==='保本') S.reco='高利活存';
  else S.reco=(S.q3==='基金')?'基金':'債券';
  const msgs=[];
  if(S.otherAmt) msgs.push(`納入您在其他機構約「${S.otherAmt}」的資產一起看，整體配置的樣貌會更完整。`);
  let allocNote;
  if(S.reco==='高利活存'){
    allocNote='考量您希望保本、不承受波動，建議以高利活存／定存為主，兼顧安全與隨時動用的彈性。';
  }else{
    const pct={high:70,mid:40,low:15}[S.depositWeight||'mid'];
    allocNote=`綜合您的用途時間與波動接受度，建議可保留約 <b>${pct}%</b> 於高利活存以備動用，其餘約 <b>${100-pct}%</b> 配置於${S.reco}，兼顧流動性與成長。`;
  }
  msgs.push(allocNote,`為您整理的參考方向為 <b>${S.reco==='高利活存'?'高利活存':S.reco+'商品'}</b>。`);
  aiSay(msgs,()=>stepCalc());
}

/* ================= 階段四：依商品試算 ================= */
function stepCalc(){
  setProgress(90);
  const cfg=RECO[S.reco];const defAmt=200000;
  aiSay([`以下試算可協助您比較不同方案的預估年收益（${cfg.calcTitle}）：`,
    "調整金額，即可比較各方案的預估結果："],()=>{
    const card=document.createElement('div');card.className='calc';
    card.innerHTML=`<div class="calc-title">${cfg.calcTitle}</div>
      <div class="calc-head">試算金額 <b id="camt">$${defAmt.toLocaleString()}</b></div>
      <input type="range" min="100000" max="3000000" step="50000" value="${defAmt}" id="camtR">
      <div class="calc-rows" id="crows"></div>
      <div class="calc-note">＊以單利、稅前估算，僅供比較參考；實際收益依商品條件而定。</div>`;
    chatBox.appendChild(card);down();
    const rr=card.querySelector('#camtR'),camt=card.querySelector('#camt'),rows=card.querySelector('#crows');
    const colors=['#b6bdc9','#2ea97f','var(--brand)'];
    function draw(){
      const amt=+rr.value;camt.textContent='$'+amt.toLocaleString();
      rr.style.setProperty('--fill',((amt-100000)/2900000*100)+'%');
      const base=amt*cfg.scen[0][1]/100;
      rows.innerHTML=cfg.scen.map((s,i)=>{
        const yr=Math.round(amt*s[1]/100),diff=Math.round(yr-base);
        return `<div class="crow ${i===cfg.hi?'hi':''}"><span class="cbar" style="background:${colors[i]||'var(--brand)'}"></span>
          <span class="cn">${s[0]}<small>${s[1]}%</small></span>
          <span class="cy">$${yr.toLocaleString()}<small>/年</small></span>
          <span class="cd">${diff>0?'+$'+diff.toLocaleString():'—'}</span></div>`;
      }).join('');
    }
    rr.oninput=draw;draw();
    const w=wrap();
    w.appendChild(choiceBtn(`查看相關商品資訊`,null,()=>{
      meSay('查看商品資訊');clearControls();productList();},false,['看','商品','好','可以','繼續','清單','了解','下一步','ok','OK']));
    setControls(w);
  });
}

/* ================= 商品清單 + 完成 ================= */
function productList(){
  setProgress(96);
  const cfg=RECO[S.reco];const list=PRODUCTS[cfg.list];
  aiSay([`以下為與此方向相關的商品，供您參考：`],()=>{
    list.forEach(p=>{
      const rc={low:'r-low',mid:'r-mid',high:'r-high'}[p.r];
      const el=document.createElement('div');el.className='prod';
      el.innerHTML=`<div class="ph"><div class="pn">${p.n}</div><span class="tag">${p.tag}</span></div>
        <div class="yield">${p.y}<small>參考年報酬</small></div>
        <div class="meta"><span class="risk ${rc}">${p.rt}</span> · ${p.fit}</div>`;
      chatBox.appendChild(el);down();
    });
    setProgress(100);
    const end=document.createElement('div');end.className='endcard';
    end.innerHTML=`<div class="ic" style="color:#1f9d57">✓</div><div class="t">初步分析完成</div>
      <div class="summary">
        資金用途時間：<b>${S.q1||'—'}</b><br>
        波動接受度：<b>${S.q2==='保本'?'希望保本':S.q2==='低波動'?'可接受小幅波動':S.q2==='中波動'?'可接受中度波動':'—'}</b><br>
        ${S.otherAmt?'含他行資產：<b>'+S.otherAmt+'</b><br>':''}建議參考方向：<b>${cfg.name}</b>
      </div>
      <div class="d">以上為初步參考分析，非投資建議。<br>完整規劃與商品資訊，歡迎洽詢專員。</div>`;
    chatBox.appendChild(end);down();
    const w=wrap();const b=document.createElement('button');b.className='primary';b.style.marginTop='4px';
    b.textContent='重新開始';b.onclick=resetAll;w.appendChild(b);setControls(w);
    freeOverride=()=>aiSay(["本次分析已完成。若要重新開始，請點選下方按鈕。"]);
  });
}
(function(){const ci=document.getElementById('chatInput'),cs=document.getElementById('chatSend');
  const send=()=>{const v=ci.value.trim();if(!v)return;ci.value='';handleFree(v);};
  if(cs)cs.onclick=send;if(ci)ci.addEventListener('keydown',e=>{if(e.key==='Enter')send();});
})();
resetAll();
</script>
